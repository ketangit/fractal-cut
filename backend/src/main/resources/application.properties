spring.application.name=puzzle-backend

# Database — override via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/puzzlecore}
spring.datasource.username=${DB_USER:puzzlecore}
spring.datasource.password=${DB_PASS:puzzlecore}
spring.datasource.hikari.maximum-pool-size=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Wasm binary on classpath
puzzle.wasm.path=${WASM_PATH:wasm/puzzle_core_server.wasm}

server.port=${PORT:8080}
