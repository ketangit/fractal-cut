name: Build, Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  REGION: us-central1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  BACKEND_SERVICE: puzzle-backend
  FRONTEND_SERVICE: puzzle-frontend

jobs:
  # ─── Rust / Wasm ──────────────────────────────────────────────────────────
  wasm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.83'
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: puzzle-core

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build browser Wasm (bindgen)
        working-directory: puzzle-core
        run: wasm-pack build --release --target web --out-dir ../pkg -- --features bindgen

      - name: Build server Wasm (C-ABI)
        working-directory: puzzle-core
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Run Rust tests
        working-directory: puzzle-core
        run: cargo test --release

      - name: Upload browser Wasm pkg
        uses: actions/upload-artifact@v7
        with:
          name: browser-wasm
          path: pkg/

      - name: Upload server Wasm
        uses: actions/upload-artifact@v7
        with:
          name: server-wasm
          path: puzzle-core/target/wasm32-unknown-unknown/release/puzzle_core.wasm

  # ─── Next.js frontend ─────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    needs: wasm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Download browser Wasm
        uses: actions/download-artifact@v8
        with:
          name: browser-wasm
          path: pkg/

      - name: Copy Wasm to frontend lib/wasm
        run: |
          mkdir -p frontend/lib/wasm
          cp pkg/puzzle_core.js frontend/lib/wasm/puzzle_core.js
          cp pkg/puzzle_core_bg.wasm frontend/lib/wasm/puzzle_core_bg.wasm
          cp pkg/puzzle_core.d.ts frontend/lib/wasm/puzzle_core.d.ts
          cp pkg/puzzle_core_bg.wasm.d.ts frontend/lib/wasm/puzzle_core_bg.wasm.d.ts

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: pnpm run build

      - name: Upload Next.js build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/.next/

  # ─── Spring Boot backend ──────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    needs: wasm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Download server Wasm
        uses: actions/download-artifact@v8
        with:
          name: server-wasm
          path: backend/src/main/resources/wasm/

      - name: Rename to expected filename
        run: mv backend/src/main/resources/wasm/puzzle_core.wasm backend/src/main/resources/wasm/puzzle_core_server.wasm

      - name: Build & unit tests
        working-directory: backend
        run: mvn package -q

      - name: Upload backend jar
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/backend-*.jar

      - name: Verify Flyway migrations in jar
        run: |
          set -e
          JAR=$(ls backend/target/backend-*.jar | head -1)
          echo "Listing migration scripts in $JAR:"
          unzip -l "$JAR" | grep db/migration || (echo "Migrations not found in jar!" && exit 1)

  # ─── Isomorphic parity gate ───────────────────────────────────────────────
  isomorphic-parity:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18.2
        env:
          POSTGRES_DB: puzzlecore
          POSTGRES_USER: puzzlecore
          POSTGRES_PASSWORD: puzzlecore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U puzzlecore"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download backend jar
        uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: jars/

      - name: Start backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/puzzlecore
          DB_USER: puzzlecore
          DB_PASS: puzzlecore
        run: |
          java -jar jars/backend-*.jar > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "Backend process exited unexpectedly"; cat /tmp/backend.log; exit 1
            fi
            if curl -sf http://localhost:8080/actuator/health; then
              echo "Backend is healthy"; break
            fi
            if [ $i -eq 60 ]; then
              echo "Backend failed to become healthy after 120s"; cat /tmp/backend.log; exit 1
            fi
            sleep 2
          done

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/.next/

      - name: Prepare Next.js standalone
        run: cp -r frontend/.next/static frontend/.next/standalone/.next/

      - name: Start frontend
        run: |
          PORT=3000 node frontend/.next/standalone/server.js > /tmp/frontend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend is ready"; break
            fi
            if [ $i -eq 30 ]; then
              echo "Frontend failed to start after 60s"; cat /tmp/frontend.log; exit 1
            fi
            sleep 2
          done

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Download browser Wasm
        uses: actions/download-artifact@v8
        with:
          name: browser-wasm
          path: pkg/

      - name: Install Playwright
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      # Run Playwright to capture browser SVG, then compare with server SVG
      - name: Isomorphic parity check (modes 1, 2, 3)
        working-directory: frontend
        run: pnpm exec playwright test e2e/isomorphic.spec.ts
        env:
          API_URL: http://localhost:8080
        continue-on-error: true

      - name: Print backend logs on failure
        if: always()
        run: |
          echo "=== Backend logs ==="
          cat /tmp/backend.log || echo "(log file not found)"
          echo "=== End backend logs ==="

      - name: Print frontend logs on failure
        if: always()
        run: |
          echo "=== Frontend logs ==="
          cat /tmp/frontend.log || echo "(log file not found)"
          echo "=== End frontend logs ==="

  # ─── Deploy (only on master push) ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [isomorphic-parity]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write  # Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build & push Docker images
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          docker build \
            --target runtime \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/puzzle/backend:${{ github.sha }} \
            .
          docker build \
            --target frontend-runtime \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/puzzle/frontend:${{ github.sha }} \
            .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/puzzle/backend:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/puzzle/frontend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/puzzle/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 4 \
            --memory 1Gi \
            --set-env-vars "DB_URL=${{ secrets.DB_URL }},DB_USER=${{ secrets.DB_USER }},DB_PASS=${{ secrets.DB_PASS }}"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/puzzle/frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 20 \
            --concurrency 80 \
            --memory 512Mi \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}"
